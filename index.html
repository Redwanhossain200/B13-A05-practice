<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker</title>

  <!-- DaisyUI and Tailwind CSS CDN  -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Google Fonts  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <!-- Font Awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Favicon -->
  <link rel="shortcut icon" href="https://img.icons8.com/?size=48&id=D5XsEXNbhkMI&format=png" type="image/x-icon">

  <link rel="stylesheet" href="./style.css">
</head>

<body class="bg-[#F8FAFC]">

  <section id="login-section" class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-100 w-full max-w-md text-center">
      <img src="./assets/github-logo.png" alt="GitHub" class="w-16 mx-auto mb-4">
      <h1 class="text-2xl font-bold text-[#1E293B]">GitHub Issues Tracker</h1>
      <p class="text-gray-500 text-sm mb-8">Sign in to manage your issues</p>

      <form id="login-form" class="text-left">
        <div class="form-control mb-4">
          <label class="label text-sm font-semibold">Username</label>
          <input type="text" id="username" placeholder="Enter Username"
            class="input input-bordered w-full focus:outline-none focus:border-[#4F46E5]" required>
          <span class="text-[10px] text-[#4a00ff] mt-1">Default: admin</span>
        </div>
        <div class="form-control mb-6">
          <label class="label text-sm font-semibold">Password</label>
          <input type="password" id="password" placeholder="Enter Password"
            class="input input-bordered w-full focus:outline-none focus:border-[#4F46E5]" required>
          <span class="text-[10px] text-[#4a00ff] mt-1">Default: admin123</span>
        </div>
        <button type="submit" class="btn bg-[#4a00ff] hover:bg-[#4F46E5] text-white w-full border-none">Sign In</button>
      </form>

      <div class="divider text-xs text-gray-400 my-8">OR</div>

      <p class="text-xs text-gray-500 mb-2">Demo Credentials:</p>
      <div class="bg-gray-50 p-4 rounded-lg">
        <p class="text-sm font-semibold">Username: <span class="text-gray-700 font-normal">admin</span></p>
        <p class="text-sm font-semibold">Password: <span class="text-gray-700 font-normal">admin123</span></p>
      </div>
    </div>
  </section>


  <section id="main-section" class="hidden">
    <nav class="bg-white border-b border-gray-100 px-4 py-3 sticky top-0 z-50">
      <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-2">
          <i class="fa-brands fa-github text-2xl"></i>
          <span class="text-lg font-bold text-[#1E293B]">GitHub Issues Tracker</span>
        </div>
        <div class="flex gap-2 w-full md:w-auto">
          <div class="relative w-full md:w-80">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="text" id="search-input" placeholder="Search issues..."
              class="input input-bordered w-full pl-10 h-10 text-sm focus:outline-none focus:ring-1 focus:ring-[#6366F1] rounded-md">
          </div>
          <button
            class="btn bg-[#6366F1] text-white btn-sm h-10 px-4 border-none hover:bg-[#4F46E5] hover:scale-105 active:scale-95 transition-transform">
            <i class="fa-solid fa-plus"></i> New Issue
          </button>
        </div>
      </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
      <div class="flex gap-2 mb-8 bg-white p-2 rounded-lg w-fit md:w-full shadow-sm border border-gray-100">
        <button onclick="filterData('all')"
          class="tab-btn px-10 py-2 rounded-md text-sm font-medium active-tab cursor-pointer">All</button>
        <button onclick="filterData('open')"
          class="tab-btn px-10 py-2 rounded-md text-sm font-medium text-gray-500 cursor-pointer">Open</button>
        <button onclick="filterData('closed')"
          class="tab-btn px-10 py-2 rounded-md text-sm font-medium text-gray-500 cursor-pointer">Closed</button>
      </div>

      <div class="bg-white p-6 rounded-t-xl border border-gray-100 flex justify-between items-center">
        <div class="flex items-center gap-4">
          <div class="flex items-center justify-center bg-[#ece4ff] p-3 rounded-full">
            <img src="./assets/Aperture.png" alt="Aperture">
          </div>
          <div>
            <h2 class="text-xl font-bold text-[#1E293B]" id="issue-count-text">0 Issues</h2>
            <p class="text-xs text-gray-500">Track and manage your project issues</p>
          </div>
        </div>
        <div class="flex gap-4 text-xs font-semibold">
          <span class="flex items-center gap-1"><span class="w-2 h-2 bg-green-500 rounded-full"></span> Open</span>
          <span class="flex items-center gap-1"><span class="w-2 h-2 bg-purple-500 rounded-full"></span> Closed</span>
        </div>
      </div>

      <div id="loading-spinner" class="flex justify-center p-20 hidden bg-white border border-t-0 border-gray-100">
        <span class="loading loading-spinner loading-lg text-[#6366F1]"></span>
      </div>

      <div id="issue-grid"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 bg-white p-6 border border-t-0 border-gray-100 rounded-b-xl min-h-[400px]">
      </div>
    </main>
  </section>

  <dialog id="issue_modal" class="modal">
    <div class="modal-box max-w-2xl p-8">
      <div id="modal-content"></div>
      <div class="modal-action">
        <form method="dialog">
          <button class="btn bg-[#4a00ff] text-white border-none px-8">Close</button>
        </form>
      </div>
    </div>
  </dialog>

  <script src="./script.js"></script>
</body>

</html>
